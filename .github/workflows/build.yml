name: build

# Triggers:
# - pull_request:     auto-run on every PR push (gates merge via branch protection)
# - workflow_dispatch: manual trigger from GitHub UI (used after merges to main)
# Intentionally no `push: branches: [main]` — main is verified manually after merge.
on:
  pull_request:
  workflow_dispatch:

# Cancel in-flight runs when a new commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .node-version
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm build
