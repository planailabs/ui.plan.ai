<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="ui.plan.ai — a workbench for agent-generated UI">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a5f3fc"/>
      <stop offset="100%" stop-color="#4ade80"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 L0 0 0 48" fill="none" stroke="rgba(165,243,252,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="80" y="80" width="200" height="32" rx="16" fill="none" stroke="#27272a" stroke-width="1"/>
  <circle cx="100" cy="96" r="4" fill="#4ade80"/>
  <text x="116" y="100" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="11" letter-spacing="2" fill="#a1a1aa">V1 — PLATFORM SHIPPING</text>
  <text x="80" y="290" font-family="ui-sans-serif, system-ui, Inter, sans-serif" font-size="92" font-weight="500" letter-spacing="-2" fill="#fafafa">a workbench for</text>
  <text x="80" y="395" font-family="ui-sans-serif, system-ui, Inter, sans-serif" font-size="92" font-weight="500" letter-spacing="-2" fill="url(#accent)">agent-generated UI.</text>
  <text x="80" y="475" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="22" fill="#a1a1aa">trusted agents submit dated frames — the workbench reviews,</text>
  <text x="80" y="505" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="22" fill="#a1a1aa">approves, and publishes them at dated URLs.</text>
  <line x1="80" y1="555" x2="1120" y2="555" stroke="#27272a" stroke-width="1"/>
  <text x="80" y="590" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="18" fill="#fafafa">ui.plan.ai</text>
  <text x="1120" y="590" font-family="ui-monospace, SF Mono, Menlo, monospace" font-size="18" fill="#a1a1aa" text-anchor="end">POST /v1/frame-submissions</text>
</svg>
