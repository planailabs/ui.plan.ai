project_id = "ui-plan-ai"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:4321"
additional_redirect_urls = [
  "http://localhost:4321/workbench/",
  "http://localhost:4321/workbench/accept-invite/",
]
jwt_expiry = 3600
enable_signup = false
enable_anonymous_sign_ins = false
minimum_password_length = 12

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = true
otp_expiry = 600
otp_length = 6

[auth.mfa]
max_enrolled_factors = 5

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[edge_runtime]
enabled = true
inspector_port = 8083
policy = "oneshot"

[functions.frame-submissions]
verify_jwt = false

[functions.media-uploads]
verify_jwt = false

[functions.submission-status]
verify_jwt = false

[functions.stream-webhook]
verify_jwt = false

[functions.team-invitations]
verify_jwt = true
